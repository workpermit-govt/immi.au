<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Admin Login — China Tradex N Tour</title>
<link rel="icon" type="image/png" href="../images/favicon.png">
<link rel="stylesheet" href="../style.css">
</head>
<body class="admin-page-body">

<div class="admin-shell">
  <form class="admin-login-card" id="adminLoginForm" novalidate>
    <div class="admin-icon">&#128274;</div>
    <h2>Admin Access</h2>
    <p class="admin-sub">Restricted area. Authorized staff only.</p>

    <div class="field">
      <label for="adminUser">Username</label>
      <input type="text" id="adminUser" name="adminUser" autocomplete="username" required>
    </div>
    <div class="field">
      <label for="adminPass">Password</label>
      <input type="password" id="adminPass" name="adminPass" autocomplete="current-password" required>
    </div>

    <p class="admin-error" id="adminError">Incorrect username or password.</p>

    <button type="submit" class="btn btn-gold btn-block">Sign In</button>
    <p class="form-note" style="text-align:center; margin-top:18px;"><a href="../index.html" style="color:var(--text-faint);">&larr; Back to site</a></p>
  </form>
</div>

<script src="../script.js"></script>
</body>
</html>
